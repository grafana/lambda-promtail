name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Set version
        run: echo "VERSION=$(./tools/version)" >> $GITHUB_ENV

      - name: Build
        run: GOOS=linux CGO_ENABLED=0 go build -o ./bootstrap ./...

      - name: Package
        run: zip "lambda-promtail-${{ env.VERSION }}.zip" bootstrap

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Upload to S3
        run: |
          aws s3 cp "lambda-promtail-${{ env.VERSION }}.zip" \
            s3://fh-lambda-artifacts-staging/lambda-promtail-${{ env.VERSION }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: lambda-promtail-${{ env.VERSION }}.zip
          generate_release_notes: true
